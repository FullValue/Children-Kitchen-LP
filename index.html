<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réservation Cantine - La cantine scolaire simplifiée</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
    <script>
      // Fix for "TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // This happens because some dependencies (like formdata-polyfill via node-fetch) 
      // attempt to reassign window.fetch.
      (function() {
        const originalFetch = window.fetch;
        if (originalFetch) {
          try {
            Object.defineProperty(window, 'fetch', {
              value: originalFetch,
              writable: true,
              configurable: true,
              enumerable: true
            });
          } catch (e) {
            console.warn('CantineConnect: Could not make fetch configurable', e);
          }
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
